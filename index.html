<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <main class="container-fluid py-4">
    <section class="form-wrapper mx-auto">
      <h1 class="text-center mb-4">Formulario de Registro</h1>

      <form id="registroForm" novalidate>
        <div class="row g-5">
          <div class="col-12 col-lg-4">
            <div class="campo-form">
              <div class="label-row">
                <label for="nombre" class="form-label">Nombre completo</label>
                <span class="obligatorio" id="reqNombre">*</span>
              </div>
              <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre completo">
            </div>

            <div class="campo-form">
              <div class="label-row">
                <label for="cv" class="form-label">Curriculum Vitae</label>
              </div>

              <div class="file-box" id="cvBox">
                <button type="button" class="file-button" id="btnSeleccionarCv">Seleccionar</button>
                <span class="file-name" id="nombreCv">Solo .docx, .pdf</span>
                <input type="file" id="cv" accept=".pdf,.docx">
              </div>
            </div>

            <div class="campo-form">
              <div class="label-row">
                <label for="password" class="form-label">Contraseña</label>
                <span class="obligatorio" id="reqPassword">*</span>
              </div>
              <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="campo-form">
              <div class="label-row">
                <label for="rut" class="form-label">Rut</label>
                <span class="obligatorio" id="reqRut">*</span>
              </div>
              <input type="text" class="form-control" id="rut" placeholder="Ej: 12.345.678-9">
            </div>

            <div class="campo-form">
              <div class="label-row">
                <label for="email" class="form-label">Email</label>
                <span class="obligatorio" id="reqEmail">*</span>
              </div>
              <input type="text" class="form-control" id="email" placeholder="nombre@gmail.com">
            </div>

            <div class="campo-form">
              <div class="label-row">
                <label for="repetirPassword" class="form-label">Repetir contraseña</label>
                <span class="obligatorio" id="reqRepetirPassword">*</span>
              </div>
              <input type="password" class="form-control" id="repetirPassword" placeholder="Repita su contraseña">
            </div>

            <div class="botones-form">
              <button type="button" class="btn btn-outline-light" id="btnCancelar">Cancelar</button>
              <button type="submit" class="btn btn-light" id="btnEnviar">Guardar</button>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="campo-form">
              <div class="label-row">
                <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
              </div>
              <input type="date" class="form-control" id="fechaNacimiento">
            </div>

            <div class="campo-form">
              <div class="label-row">
                <label for="genero" class="form-label">Género</label>
              </div>
              <select class="form-select" id="genero">
                <option value="">Seleccione...</option>
                <option value="femenino">Femenino</option>
                <option value="masculino">Masculino</option>
                <option value="otro">Otro</option>
              </select>
            </div>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
