<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <main class="page">
    <section class="form-card">
      <h1>Formulario de Registro</h1>

      <form id="registroForm" novalidate>
        <div class="row gx-4 gy-3">
          <div class="col-12 col-lg-4">
            <div class="field">
              <div class="label-row">
                <label for="nombre">Nombre completo</label>
                <span>*</span>
              </div>
              <div class="input-shell" id="boxNombre">
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo">
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="cv">Curriculum Vitae</label>
              </div>
              <div class="file-shell" id="boxCv">
                <button type="button" id="btnCv">Seleccionar</button>
                <span id="nombreCv">Solo .docx, .pdf</span>
                <input type="file" id="cv" accept=".docx,.pdf">
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="password">Contraseña</label>
                <span>*</span>
              </div>
              <div class="input-shell" id="boxPassword">
                <input type="password" id="password" placeholder="Ingrese su contraseña">
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="field">
              <div class="label-row">
                <label for="rut">Rut</label>
                <span>*</span>
              </div>
              <div class="input-shell" id="boxRut">
                <input type="text" id="rut" placeholder="Ej. 12346546-7">
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="email">Email</label>
                <span>*</span>
              </div>
              <div class="input-shell" id="boxEmail">
                <input type="text" id="email" placeholder="nombre@gmail.com">
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="repetirPassword">Repetir contraseña</label>
                <span>*</span>
              </div>
              <div class="input-shell" id="boxRepetirPassword">
                <input type="password" id="repetirPassword" placeholder="Repita su contraseña">
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="field">
              <div class="label-row">
                <label for="fechaNacimiento">Fecha de nacimiento</label>
              </div>
              <div class="input-shell date-shell" id="boxFecha">
                <input type="date" id="fechaNacimiento">
                <button type="button" class="calendar-button" id="btnCalendario" aria-label="Abrir calendario">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 2v3M17 2v3M4 9h16M6 5h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" />
                    <path d="M8 12h2M12 12h2M16 12h2M8 16h2M12 16h2M16 16h2" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="genero">Género</label>
              </div>
              <div class="input-shell select-shell" id="boxGenero">
                <select id="genero">
                  <option value="">Seleccione</option>
                  <option value="femenino">Femenino</option>
                  <option value="masculino">Masculino</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
            </div>

            <div class="buttons">
              <button type="submit">Enviar</button>
              <button type="button" id="btnCancelar">Cancelar</button>
            </div>
          </div>
        </div>
      </form>
    </section>

    <footer>Gracias por responder nuestro formulario</footer>
  </main>

  <script src="./js/app.js"></script>
</body>

</html>
